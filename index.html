<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="suelo" src="suelos.jpg">
        <img id="techo" src="vigas.jpg">
        <img id="paredes" src="paredes.jpg">,
      </a-assets>
      //paredes
      <a-box position="0 0.1 0" rotation="0 90 0" depth="3" height="0.2" width="3" color="#9a9898" src="#suelo"></a-box>
      <a-box position="0 3.3 0" rotation="0 90 0" depth="3" height="0.2" width="3" color="#9a9898" src="#techo"></a-box>
      <a-box position="0 1.7 -1.4" rotation="90 90 90" depth="3" height="0.2" width="3" color="#e9d8d9" src="#paredes"></a-box>
      <a-box position="0 1.7 1.4" rotation="90 90 90" depth="3" height="0.2" width="3" color="#e9d8d9" src="#paredes"></a-box>
      <a-box position="1.4 1.7 0" rotation="90 0 90" depth="3" height="0.2" width="3" color="#e4bebe" src="#paredes"></a-box>
      <a-sky position="0 1 0" color="#ECECEC"></a-sky>
      < a-entity  light = "type: ambient; position="3 3 3" color: #FFFFFF" > </ a-entity >
      <a-entity id="rig" position="-4.5 1.5 -0.2" rotation="0 -90 0" >
  <a-entity id="camera" camera look-controls></a-entity>
</a-entity>
    </a-scene>
  </body>
</html>
